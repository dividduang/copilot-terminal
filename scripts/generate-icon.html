<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Generate Icon</title>
    <style>
        body { margin: 0; padding: 20px; background: #f0f0f0; }
        #canvas { border: 1px solid #ccc; }
        button { margin: 10px; padding: 10px 20px; font-size: 16px; }
    </style>
</head>
<body>
    <h2>终端图标生成器</h2>
    <canvas id="canvas" width="512" height="512"></canvas>
    <br>
    <button onclick="downloadIcon()">下载 PNG 图标</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // 绘制图标
        function drawIcon() {
            // 背景
            ctx.fillStyle = '#0B0B0F';
            ctx.beginPath();
            ctx.roundRect(0, 0, 512, 512, 128);
            ctx.fill();

            // 命令提示符 >
            ctx.strokeStyle = '#A8AA58';
            ctx.lineWidth = 32;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            ctx.beginPath();
            ctx.moveTo(120, 200);
            ctx.lineTo(240, 280);
            ctx.lineTo(120, 360);
            ctx.stroke();

            // 下划线 _
            ctx.fillStyle = '#A8AA58';
            ctx.beginPath();
            ctx.roundRect(280, 340, 112, 32, 8);
            ctx.fill();
        }

        // 下载图标
        function downloadIcon() {
            const link = document.createElement('a');
            link.download = 'icon.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // 初始化
        drawIcon();
    </script>
</body>
</html>
